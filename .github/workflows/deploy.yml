name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # every 6 hours, to pick up new feed posts
    - cron: "0 */6 * * *"

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # actions-netlify writes back to GitHub on each deploy:
      contents: write # commit comment
      statuses: write # commit status (green check)
      pull-requests: write # PR preview-link comment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # PR and merge builds reuse the newest feed cache so build churn hits the
      # blogs with conditional GETs (mostly 304s) instead of full fetches. A 304
      # never hides new content — only unchanged feeds are skipped. Scheduled
      # and manual builds skip the restore on purpose: they refetch everything
      # from scratch, so a bad ETag can never outlive one cycle.
      - name: Restore feed cache (PR and merge builds)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/cache/restore@v4
        with:
          path: cache.json
          # the key never matches exactly; the prefix picks the newest cache
          key: feed-cache-
          restore-keys: feed-cache-

      # postinstall runs `go run main.go`: fetches feeds, writes src/data/
      - run: npm ci

      # Save the just-written cache as the new baseline. Keys are immutable, so
      # save under a per-run key; the prefix restore above picks the newest. PR
      # builds don't save — their caches would be branch-scoped and invisible
      # to every other build anyway.
      - name: Save feed cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: cache.json
          key: feed-cache-${{ github.run_id }}

      # astro build → dist/ (incl. _redirects from the netlify-redirects integration)
      - run: npm run build

      # Fork PRs can't read the Netlify secrets, so the deploy would fail red;
      # skip it there (the build and feed checks above still run).
      - name: Deploy to Netlify
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: dist
          # prod on push/schedule/dispatch; draft preview on pull_request
          production-deploy: ${{ github.event_name != 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: ${{ github.event_name }} ${{ github.sha }}
          # skip the Environments deployment record (not needed)
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
