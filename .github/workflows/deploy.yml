name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # every 6 hours, to pick up new feed posts
    - cron: "0 */6 * * *"

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # PR and merge builds restore the newest feed cache. main.go keys off its
      # presence (see below): it serves every cached feed straight from the file
      # with no network at all, fetching only feeds missing from it (newly
      # added). This keeps build churn entirely off the blogs' servers and immune
      # to their transient failures. Scheduled and manual builds skip the restore
      # on purpose: with no cache.json they refetch everything from scratch, so a
      # bad ETag can never outlive one cycle. Freshness is owned by the 6h build.
      - name: Restore feed cache (PR and merge builds)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/cache/restore@v4
        with:
          path: cache.json
          # the key never matches exactly; the prefix picks the newest cache
          key: feed-cache-
          restore-keys: feed-cache-

      # postinstall runs `go run main.go`: writes src/data/. It keys off whether
      # cache.json exists — present (PR/merge builds, from the restore above)
      # means serve cached feeds and fetch only misses; absent (scheduled and
      # dispatch builds) means refetch everything fresh.
      - run: npm ci

      # Save the just-written cache as the new baseline. Keys are immutable, so
      # save under a per-run key; the prefix restore above picks the newest. PR
      # builds don't save — their caches would be branch-scoped and invisible
      # to every other build anyway.
      - name: Save feed cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: cache.json
          key: feed-cache-${{ github.run_id }}

      # astro build → dist/ (incl. _redirects from the netlify-redirects integration)
      # PR builds bake the deploy-preview origin into absolute URLs (og:image);
      # the matching `alias` on the deploy step makes Netlify serve that URL.
      - run: npm run build
        env:
          SITE_URL: ${{ github.event_name == 'pull_request' && format('https://deploy-preview-{0}--blogroll-it.netlify.app', github.event.number) || '' }}

      # Fork PRs can't read the Netlify secrets, so the deploy would fail red;
      # skip it there (the build and feed checks above still run).
      # netlify-cli instead of nwtgck/actions-netlify (tried v3 and v4): the
      # action's API-based deploy ships function bundles the current Netlify
      # runtime can't boot (Internal Error, no function logs), even for a
      # single dependency-free function file; the CLI packages them correctly
      # and reads netlify.toml ([functions] directory) natively.
      - name: Deploy to Netlify
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        # prod on push/schedule/dispatch; on pull_request an aliased draft:
        # deterministic preview URL, must match SITE_URL in the build step
        run: >
          npx netlify-cli deploy --no-build --dir dist
          --message "${{ github.event_name }} ${{ github.sha }}"
          ${{ github.event_name != 'pull_request' && '--prod' || format('--alias deploy-preview-{0}', github.event.number) }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # Separate job so a transient failure here doesn't force a full build+deploy rerun.
  comment:
    needs: deploy
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # Preview-link comment (was provided by actions-netlify). The aliased
      # URL is stable across pushes, so comment once and skip if present.
      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          url="https://deploy-preview-${PR_NUMBER}--blogroll-it.netlify.app"
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"${url}\"))] | length")
          if [ "$existing" = "0" ]; then
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="🚀 Deploy preview: ${url}"
          fi

