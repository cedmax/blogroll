name: Remove inactive feeds → issues

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday, 09:00 UTC
  workflow_dispatch:
    inputs:
      unavailable_days:
        description: Unavailability threshold in days
        default: "21"
        required: false
        type: string
      stale_days:
        description: Staleness threshold in days
        default: "365"
        required: false
        type: string

permissions:
  issues: write

jobs:
  open-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Open removal issues
        run: node .github/scripts/find-inactive-feeds.mjs
        env:
          GH_TOKEN: ${{ github.token }}
          UNAVAIL_DAYS: ${{ inputs.unavailable_days || '21' }}
          STALE_DAYS: ${{ inputs.stale_days || '365' }}
