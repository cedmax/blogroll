name: Feed suggestion → PR

# When someone files a "Proponi un sito" issue, parse it and open a PR that
# adds the feed to public/ita.opml for a maintainer to review. Re-runs (edits)
# update the same PR because the branch is keyed by issue number.
#
# No `opened` trigger: issues created with the label (as the Netlify function
# does) fire both `opened` and `labeled`, causing duplicate runs. `labeled`
# alone covers API-created issues and manually labeled ones.
on:
  issues:
    types: [edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: feed-suggestion-${{ inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  open-pr:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'feed-suggestion')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch issue body
        id: issue-body
        run: |
          {
            echo 'content<<EOF'
            gh issue view "${{ inputs.issue_number || github.event.issue.number }}" --json body -q .body
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/add-feed.yml
          issue-body: ${{ steps.issue-body.outputs.content }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Add feed to OPML
        id: opml
        env:
          ISSUE_JSON: ${{ steps.parse.outputs.jsonString }}
        run: node .github/scripts/add-feed-to-opml.mjs

      # A GitHub App token so the opened PR triggers pull_request workflows
      # (Validate submitted feed, Netlify preview). Events raised by the default
      # GITHUB_TOKEN never start new runs, which would skip those checks.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FEED_BOT_CLIENT_ID }}
          private-key: ${{ secrets.FEED_BOT_PRIVATE_KEY }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: feed/issue-${{ inputs.issue_number || github.event.issue.number }}
          title: "Aggiungi sito: ${{ steps.opml.outputs.name }}"
          commit-message: "Aggiungi sito: ${{ steps.opml.outputs.name }}"
          assignees: cedmax
          labels: feed-suggestion
          body: |
            Aggiunge **${{ steps.opml.outputs.name }}** a `public/ita.opml`, dalla issue #${{ inputs.issue_number || github.event.issue.number }}.

            - Sito: ${{ steps.opml.outputs.site_url }}
            - Feed: ${{ steps.opml.outputs.feed_url }}

            Un controllo dedicato (**Validate submitted feed**) fa il fetch del feed aggiunto: se non è raggiungibile o non è un feed RSS/Atom valido, il check fallisce.

            Closes #${{ inputs.issue_number || github.event.issue.number }}
