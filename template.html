<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blogroll.it — {{.EntryCount}} post da {{.FeedCount}} blog</title>
<meta name="description" content="Post recenti da {{.FeedCount}} blog personali italiani, aggiornati ogni poche ore. Niente algoritmi, niente account, solo link.">
<meta name="author" content="cedmax">
<link rel="canonical" href="https://blogroll.it/">
<link rel="alternate" type="application/opml+xml" title="Blogroll.it OPML" href="https://blogroll.it/engblogs.opml">
<meta property="og:type" content="website">
<meta property="og:title" content="Blogroll.it">
<meta property="og:description" content="Post recenti da {{.FeedCount}} blog personali italiani, aggiornati ogni poche ore.">
<meta property="og:url" content="https://blogroll.it/">
<meta property="og:site_name" content="Blogroll.it">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Blogroll.it">
<meta name="twitter:description" content="Post recenti da {{.FeedCount}} blog personali italiani, aggiornati ogni poche ore.">
<meta name="theme-color" content="#D6EED8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #D6EED8;
  --bg-card:   #EAF6EB;
  --bg-alt:    #F2FAF3;
  --ink:       #1A2E1C;
  --ink-mid:   #3E5C41;
  --ink-muted: #5E7862;
  --green:     #2E6B36;
  --green-h:   #245929;
  --border:    #B8D6BA;
  --border-l:  #CDE5CF;
  /* typography scale */
  --sz-stamp:  12px;    /* dates, domain labels */
  --sz-ui:     13px;    /* nav, footer, meta */
  --sz-desc:   13.5px;  /* descriptions */
  --sz-title:  14.5px;  /* post titles in lists */
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── layout ── */
.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

/* ── header ── */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem 1rem;
  margin-bottom: 2.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.site-name {
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--green);
  text-decoration: none;
}
.site-name:hover { color: var(--green-h); }

.site-nav {
  display: flex;
  gap: 1.25rem;
  font-size: var(--sz-ui);
}
.site-nav a { color: var(--ink-mid); text-decoration: none; }
.site-nav a:hover { color: var(--green); text-decoration: underline; }
.site-nav .active { color: var(--ink); font-weight: 600; }

/* ── meta line ── */
.meta-line {
  font-size: var(--sz-ui);
  color: var(--ink-muted);
  margin-bottom: 2rem;
}

/* ── day sections ── */
.day-section { margin-bottom: 1rem; }

.day-heading {
  font-size: var(--sz-stamp);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.4rem;
  padding-left: 1rem;
}

/* ── entry list ── */
.entries {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.entry {
  display: grid;
  grid-template-columns: 185px 1fr;
  border-bottom: 1px solid var(--border-l);
}
.entry:last-child { border-bottom: none; }
.entry:nth-child(even) { background: var(--bg-alt); }

.entry-source {
  padding: 9px 12px;
  font-size: var(--sz-ui);
  font-weight: 500;
  color: var(--green);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-right: 1px solid var(--border-l);
  display: flex;
  align-items: center;
}
.entry-source a { color: inherit; text-decoration: none; }
.entry-source a:hover { color: var(--green-h); text-decoration: underline; }

.entry-title {
  padding: 9px 14px;
  display: flex;
  align-items: center;
}
.entry-title a {
  font-size: var(--sz-title);
  color: var(--ink);
  text-decoration: none;
  line-height: 1.35;
}
.entry-title a:visited { color: var(--ink-muted); }
.entry-title a:hover { color: var(--green); text-decoration: underline; }

/* ── footer ── */
.site-footer {
  margin-top: 3rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: var(--sz-ui);
  color: var(--ink-muted);
}
.site-footer a { color: var(--green); text-decoration: none; }
.site-footer a:hover { color: var(--green-h); text-decoration: underline; }

/* ── mobile ── */
@media (max-width: 560px) {
  .entry {
    display: block;
    padding: 8px 12px;
  }
  .entry-source {
    padding: 0 0 3px;
    border-right: none;
    font-size: var(--sz-stamp);
    display: block;
  }
  .entry-title {
    padding: 0;
    display: block;
  }
  .entry-title a { font-size: var(--sz-title); }
}

@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a class="site-name" href="/">Blogroll.it</a>
    <nav class="site-nav">
      <span class="active">post recenti</span>
      <a href="/directory/">la lista</a>
      <a href="/engblogs.opml">OPML</a>
    </nav>
  </header>

  <p class="meta-line">{{.EntryCount}} post da {{.FeedCount}} blog negli ultimi {{.MaxDays}} giorni &mdash; {{.BuiltAt}}</p>

  {{range .Groups}}
  <div class="day-section">
    <h2 class="day-heading">{{.Date}}</h2>
    <div class="entries">
      {{range .Entries}}
      <div class="entry">
        <span class="entry-source"><a href="/sites/{{.BlogSlug}}/">{{.BlogName}}</a></span>
        <span class="entry-title"><a href="{{.URL}}" target="_blank" rel="noopener noreferrer">{{.Title}}</a></span>
      </div>
      {{end}}
    </div>
  </div>
  {{end}}

  <footer class="site-footer">
    <a href="https://github.com/cedmax/blogroll/issues">Suggerisci un blog</a> aprendo una issue o una PR su <a href="https://github.com/cedmax/blogroll">GitHub</a>.
  </footer>

</div>
</body>
</html>
